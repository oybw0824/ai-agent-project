server:
  port: ${SERVER_PORT:8083}

spring:
  application:
    name: nacos-mcp-agent
  datasource:
    url: ${AGENT_DB_URL:jdbc:h2:mem:nacos_mcp_agent;MODE=Oracle;DATABASE_TO_UPPER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${AGENT_DB_USERNAME:sa}
    password: ${AGENT_DB_PASSWORD:}
    driver-class-name: ${AGENT_DB_DRIVER:org.h2.Driver}
  sql:
    init:
      mode: ${AGENT_DB_INIT_MODE:always}
      schema-locations: classpath:sql/h2-schema.sql
      data-locations: classpath:sql/h2-data.sql
  ai:
    mcp:
      server:
        enabled: true
        name: ${MCP_SERVER_NAME:nacos-mcp-agent}
        version: ${MCP_SERVER_VERSION:1.0.19}
        instructions: Nacos MCP validation server.
        type: ASYNC
        protocol: STREAMABLE
        tool-callback-converter: false
        streamable-http:
          mcp-endpoint: /mcp
      client:
        enabled: ${MCP_DISCOVERY_ENABLED:true}
        name: ${MCP_CLIENT_NAME:nacos-mcp-agent-client}
        version: 1.0.0
        request-timeout: 30s
        type: ASYNC
    alibaba:
      mcp:
        nacos:
          server-addr: ${NACOS_ADDR:127.0.0.1:8848}
          namespace: ${NACOS_NAMESPACE:public}
          username: ${NACOS_USERNAME:nacos}
          password: ${NACOS_PASSWORD:nacos}
          register:
            enabled: ${MCP_REGISTER_ENABLED:true}
            service-name: ${MCP_REGISTER_SERVICE_NAME:${MCP_SERVER_NAME:nacos-mcp-agent}}
            service-group: ${NACOS_MCP_SERVICE_GROUP:mcp-server}
          client:
            enabled: ${MCP_DISCOVERY_ENABLED:true}
            lazy-init: true
            configs:
              remote:
                server-addr: ${NACOS_ADDR:127.0.0.1:8848}
                namespace: ${NACOS_NAMESPACE:public}
                username: ${NACOS_USERNAME:nacos}
                password: ${NACOS_PASSWORD:nacos}
            streamable:
              connections:
                remote:
                  service-name: ${REMOTE_MCP_SERVICE_NAME:remote-credit-mcp}
                  version: ${REMOTE_MCP_SERVICE_VERSION:1.0.18}

mcp:
  tools:
    weather:
      enabled: ${MCP_WEATHER_TOOL_ENABLED:true}
    credit:
      enabled: ${MCP_CREDIT_TOOL_ENABLED:true}

agent:
  runtime:
    enabled: ${AGENT_RUNTIME_ENABLED:true}
    skills-classpath: skills
  audit:
    enabled: ${AGENT_AUDIT_ENABLED:true}
    log-enabled: ${AGENT_AUDIT_LOG_ENABLED:true}
    db-enabled: ${AGENT_AUDIT_DB_ENABLED:true}
    mcp-tool-enabled: ${AGENT_AUDIT_MCP_TOOL_ENABLED:true}
    mcp-tool-db-enabled: ${AGENT_AUDIT_MCP_TOOL_DB_ENABLED:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.nbcb.nacosmcpagent: INFO
    com.alibaba.cloud.ai.mcp: INFO

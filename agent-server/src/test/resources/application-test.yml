# ============================================================
# agent-server 测试配置 — 禁用所有外部依赖
# ============================================================

spring:
  ai:
    openai:
      api-key: test-mock-key-not-real
      base-url: http://localhost:9999/mock-openai
      chat:
        options:
          model: deepseek-chat

    mcp:
      client:
        enabled: false

  autoconfigure:
    exclude:
      - org.springframework.ai.mcp.client.common.autoconfigure.McpClientAutoConfiguration

# ==================== Agent 限流降级治理测试配置 ====================
agent-governance:
  max-iterations:
    default: 8
    l4-high-risk: 4
  session-timeout:
    default-budget-ms: 15000
    high-risk-budget-ms: 10000
    minimum-next-step-ms: 1500
  model-call-limit:
    default-limit: 8
    l4-high-risk-limit: 4
  token-budget:
    default-max-tokens: 12000
    l4-high-risk-max-tokens: 8000
    warning-ratio: 0.8
  loop-detect:
    strict-repeat-threshold: 3
    pattern-window: 8
    alternating-repeat-threshold: 3
    stop-after-non-retryable-result: true

# ==================== 工具开关治理测试配置 ====================
# ★ 测试环境使用的工具名称，与测试类中 Mock 的工具名一致
tool-governance:
  tools:
    test-enabled-tool:
      status: ENABLED
    test-disabled-tool:
      status: DISABLED
    getWeatherByCity:
      status: ENABLED
    calculate:
      status: ENABLED

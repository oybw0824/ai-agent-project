# ============================================================
# agent-server — 智能体服务端 配置文件
# MCP 工具从 Nacos AI Registry 分布式发现（STREAMABLE 协议）
# ============================================================

server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: agent-server

  # ==================== 数据库（H2 内存库 — 治理组件配置存储） ====================
  datasource:
    url: jdbc:h2:mem:agent_governance;MODE=Oracle;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: false  # ★ H2 控制台默认关闭，调试时 -Dspring.h2.console.enabled=true
      path: /h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:sql/h2-schema.sql
      data-locations: classpath:sql/h2-data.sql

  # ==================== DeepSeek Chat Model ====================
  ai:
    openai:
      api-key: ${DEEPSEEK_API_KEY:}
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-v4-flash
          max-tokens: 32768

    # ==================== MCP Client ====================
    mcp:
      client:
        enabled: true
        name: agent-server
        version: 1.0.0
        request-timeout: 600s
        type: ASYNC

    # ==================== ★ Nacos MCP 分布式客户端 ====================
    alibaba:
      mcp:
        nacos:
          client:
            enabled: true
            streamable:
              connections:
                server1:
                  service-name: mcp-service
                  version: 1.1.0
            configs:
              server1:
                namespace: ${NACOS_NAMESPACE:public}
                server-addr: ${NACOS_ADDR:127.0.0.1:8848}
                username: ${NACOS_USERNAME:nacos}
                password: ${NACOS_PASSWORD:nacos}

# ==================== MyBatis-Plus 配置 ====================
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      table-prefix: ""

# ==================== Prompt 提示词配置 ====================
prompt:
  local:
    enabled: true
    location: classpath:prompt/*.md

# ==================== 日志 ====================
logging:
  level:
    com.nbcb.agent: INFO

# ==================== Agent 优化配置 ====================
agent:
  stream:
    timeout-seconds: 300
    max-text-length: 100_000
  retry:
    max-attempts: 2
    delay-ms: 1000
  cors:
    allowed-origins: http://localhost:3000,http://localhost:5173
  thread-pool:
    sse:
      core-size: 4
      max-size: 16
      queue-capacity: 64
    skill-gen:
      core-size: 2
      max-size: 8
      queue-capacity: 32
  skill-gen:
    merge-phases: false
    graph:
      timeout-seconds: 600
    tool-filter:
      topN: 15
      min-english-length: 3
      min-chinese-length: 2
    step:
      batch-size: 5
      simple-batch-size: 10
      single-step-timeout-ms: 60000
      batch-timeout-ms: 180000
      thread-pool:
        core-size: 2
        max-size: 10
        queue-capacity: 32
        keep-alive-seconds: 60
  llm:
    connect-timeout-ms: 5000
    read-timeout-ms: 60000
    retry:
      max-attempts: 3
      backoff-initial-ms: 1000
      backoff-multiplier: 2.0
      backoff-max-ms: 8000
    cache:
      maximum-size: 500
      ttl-hours: 6

# ==================== Agent 开关治理（缓存 + 限流降级） ====================
agent-governance:
  enabled: true
  cache:
    ttl-seconds: 30
    max-size: 2000
  admin:
    enabled: true   # ★ 验证阶段临时开启，上线前改为 false
  max-iterations:
    default: 8
    l4-high-risk: 4
  session-timeout:
    default-budget-ms: 300000
    high-risk-budget-ms: 10000
    minimum-next-step-ms: 1500
  model-call-limit:
    default-limit: 20
    l4-high-risk-limit: 4
  token-budget:
    default-max-tokens: 12000
    l4-high-risk-max-tokens: 8000
    warning-ratio: 0.8
  loop-detect:
    strict-repeat-threshold: 3
    pattern-window: 8
    alternating-repeat-threshold: 3
    stop-after-non-retryable-result: true

# ==================== 工具开关治理配置 ====================
tool-governance:
  tools:
    getWeatherByCity:
      status: ENABLED
    calculate:
      status: ENABLED

# ==================== Actuator & 监控 ====================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name:agent-server}
  endpoint:
    health:
      show-details: always
      show-components: always
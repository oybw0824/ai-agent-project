# ============================================================
# Docker Compose — Nacos 3.2.2 + MCP 工具服务 + Agent 智能体服务
# ============================================================
# 启动方式：
#   docker compose up -d
# 停止方式：
#   docker compose down
# ============================================================

services:

  # ==================== Nacos Server 3.2.2 ====================
  nacos:
    image: nacos/nacos-server:v3.2.2
    container_name: nacos-server
    environment:
      - PREFER_HOST_MODE=hostname
      - MODE=standalone
      - NACOS_AUTH_ENABLE=false
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    healthcheck:
      test: [ "CMD-SHELL", "curl -s http://localhost:8848/nacos/v1/console/health/readiness" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    volumes:
      - nacos_data:/home/nacos/data
    networks:
      - ai-network

  # ==================== MCP 工具服务端 ====================
  mcp-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: mcp-service
        PORT: 8081
    container_name: mcp-service
    environment:
      - SERVER_PORT=8081
      - NACOS_ADDR=nacos:8848
      - NACOS_NAMESPACE=public
    ports:
      - "8081:8081"
    depends_on:
      nacos:
        condition: service_healthy
    networks:
      - ai-network
    restart: unless-stopped

  # ==================== Agent 智能体服务端 ====================
  agent-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: agent-server
        PORT: 8082
    container_name: agent-server
    environment:
      - SERVER_PORT=8082
      - NACOS_ADDR=nacos:8848
      - NACOS_NAMESPACE=public
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
    ports:
      - "8082:8082"
    depends_on:
      nacos:
        condition: service_healthy
      mcp-service:
        condition: service_started
    networks:
      - ai-network
    restart: unless-stopped

# ==================== 网络 ====================
networks:
  ai-network:
    driver: bridge
    name: ai-network

# ==================== 数据卷 ====================
volumes:
  nacos_data:
    name: nacos_data